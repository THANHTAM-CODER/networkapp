<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NETWORK</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

    background:linear-gradient(135deg,#0f172a,#2563eb);

}


/* KHUNG ĐĂNG NHẬP */

.login-box{

    width:350px;

    padding:40px;

    background:white;

    border-radius:20px;

    box-shadow:0 20px 50px rgba(0,0,0,0.3);

    text-align:center;

}


.title{

    font-size:35px;

    font-weight:bold;

    color:#2563eb;

    margin-bottom:30px;

}



/* Ô NHẬP */

.input-box{

    width:100%;

    margin:15px 0;

}


.input-box input{

    width:100%;

    padding:12px;

    border-radius:10px;

    border:1px solid #ccc;

    outline:none;

    font-size:16px;

}


.input-box input:focus{

    border-color:#2563eb;

}



/* BUTTON */

button{

    width:100%;

    padding:12px;

    margin-top:20px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

}


button:hover{

    background:#1d4ed8;

}
</style>
</head>
<body>

<div class="login-box">
    <div class="title">
        NETWORK
    </div>
    <div class="input-box">
        <input 
        type="text" 
        placeholder="Username">
    </div>
    <div class="input-box">
        <input 
        type="password" 
        placeholder="Password">
    </div>
    <button onclick="login()">
        Đăng nhập
    </button>
</div>
<script>

function login(){

    let user = document.querySelector('input[type="text"]').value;
    let pass = document.querySelector('input[type="password"]').value;


    // tài khoản
    if(user === "admin" && pass === "1234"){

        window.location.href = "menu.html";

    }else{

        alert("Sai tài khoản hoặc mật khẩu!");

    }

}

</script>
</body>
</html>
