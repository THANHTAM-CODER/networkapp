<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NETWORK - Menu</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

    background:linear-gradient(135deg,#0f172a,#2563eb);

}


/* KHUNG */

.menu-box{

    width:350px;

    padding:40px;

    background:white;

    border-radius:20px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,0.3);

}


.title{

    font-size:32px;

    font-weight:bold;

    color:#2563eb;

    margin-bottom:30px;

}



/* BUTTON */

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:0.3s;

}


button:hover{

    background:#1d4ed8;

}


</style>


</head>


<body>



<div class="menu-box">


    <div class="title">
        NETWORK
    </div>


    <button onclick="openMenu()">
        Mục lục
    </button>


</div>





<script>
function openMenu(){
    window.location.href="mucluc.html";
}
</script>



</body>

</html>
